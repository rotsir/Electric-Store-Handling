<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Book your electrical service online with ProVolt Electric. Fill out the form and our dispatch will verify.">
  <title>Book Service | ProVolt Electric Services</title>
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="navbar" id="navbar">
    <div class="container flex-between" style="height: 100%;">
      <div class="logo">
        <span class="logo-icon">⚡</span> <a href="index.html">ProVolt</a>
      </div>
      <nav id="nav-links" class="nav-links flex-center">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html">About</a>
        <a href="faq.html">FAQ</a>
        <a href="track.html">Track</a>
        <a href="contact.html">Contact</a>
        <a href="booking.html" class="btn btn-primary active" style="margin-left: var(--space-sm);">Book Service</a>
      </nav>
      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">☰</button>
    </div>
  </header>

  <main>
    <section class="service-header" style="padding-top: calc(80px + var(--space-lg)); background-color: var(--clr-primary);">
      <div class="container reveal">
        <h1 style="color: var(--clr-dominant);">Service Request</h1>
        <p style="color: var(--clr-dominant); font-size: 1.25rem;">Direct input to our dispatch network.</p>
      </div>
    </section>

    <section class="section-padding">
      <div class="container reveal">
        <div style="max-width: 600px; margin: 0 auto; background: var(--clr-surface); padding: var(--space-md); border: 2px solid var(--clr-dominant);">
          
          <form id="booking-form" novalidate>
            <div class="form-group">
              <label for="b-name">Contact Name</label>
              <input type="text" id="b-name" class="form-control" placeholder="John Doe">
              <span class="error-message"></span>
            </div>

            <div class="form-group">
              <label for="b-phone">Phone Number</label>
              <input type="tel" id="b-phone" class="form-control" placeholder="(555) 000-0000">
              <span class="error-message"></span>
            </div>

            <div class="form-group">
              <label for="b-email">Email Address</label>
              <input type="email" id="b-email" class="form-control" placeholder="email@address.com">
              <span class="error-message"></span>
            </div>
            
            <div class="form-group">
              <label for="b-address">Property Address</label>
              <input type="text" id="b-address" class="form-control" placeholder="123 Grid St, Unit 4">
              <span class="error-message"></span>
            </div>

            <div class="form-group">
              <label for="b-service">Service Required</label>
              <select id="b-service" class="form-control" style="appearance: none;">
                <option value="">-- Select Vector --</option>
                <option value="Residential">Residential Repair</option>
                <option value="Commercial">Commercial Job</option>
                <option value="Solar">Solar/Generator</option>
                <option value="Inspection">Safety Inspection</option>
                <option value="Emergency">EMERGENCY RESPONSE</option>
              </select>
              <span class="error-message"></span>
            </div>

            <div class="form-group">
              <label for="b-date">Preferred Date</label>
              <input type="date" id="b-date" class="form-control">
              <span class="error-message"></span>
            </div>

            <div class="form-group">
              <label for="b-message">Additional Intel</label>
              <textarea id="b-message" class="form-control" rows="4" placeholder="Specific nature of the issue..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">SUBMIT DISPATCH</button>
          </form>

        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="text-align: center;">
        <div class="logo flex-center" style="margin-bottom: 1rem; color: #fff;">
            <span class="logo-icon">⚡</span> ProVolt
        </div>
        <p>&copy; <script>document.write(new Date().getFullYear())</script> ProVolt Electric Services. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/booking.js"></script>
</body>
</html>
