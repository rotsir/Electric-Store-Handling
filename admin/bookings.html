<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookings Management - ProVolt Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="wrapper">
    <nav class="sidebar">
      <div class="sidebar-header">⚡ ProVolt Admin</div>
      <ul class="sidebar-nav">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="bookings.html" class="active">Bookings</a></li>
        <li><a href="messages.html">Messages</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="appearance.html">Appearance</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ul>
    </nav>

    <div class="main-content">
      <div class="topbar">
        <h3>Bookings Dispatch</h3>
        <div class="topbar-right">
          <span style="font-weight: 600;">Admin</span>
          <button id="logout-btn" class="btn btn-sm btn-danger">Logout</button>
        </div>
      </div>

      <div class="content-body">
        
        <div class="card">
          <div class="card-header d-flex justify-between align-center">
            <span>Transmission Log</span>
            <div class="d-flex" style="gap: 1rem;">
              <input type="text" id="search-bookings" class="form-control" placeholder="Search customer ID/Name" style="width: 250px;">
              <select id="filter-status" class="form-control" style="width: 150px;">
                <option value="">All Statuses</option>
                <option value="Pending">Pending</option>
                <option value="Booked">Booked</option>
                <option value="Surveyed">Surveyed</option>
                <option value="Repairing Process">Repairing Process</option>
                <option value="Completed">Completed</option>
                <option value="Cancelled">Cancelled</option>
              </select>
            </div>
          </div>
          <div class="card-body">
            <div class="table-responsive">
              <table>
                <thead>
                  <tr>
                    <th>Ref ID</th>
                    <th>Customer Name</th>
                    <th>Requested Service</th>
                    <th>Execution Date</th>
                    <th>Status</th>
                    <th>Action: Change Status</th>
                    <th>Controls</th>
                  </tr>
                </thead>
                <tbody id="bookings-body">
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- View Modal -->
  <div class="modal" id="viewModal">
    <div class="modal-content">
      <div class="modal-header">
        <h4 style="margin: 0;">Detailed Booking Schematic</h4>
        <button onclick="window.ModalUtils.close('viewModal')" class="btn btn-sm btn-danger">X</button>
      </div>
      <div class="modal-body" id="modal-detail-content">
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/booking.js"></script>
</body>
</html>
