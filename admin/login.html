<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - ProVolt</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="bg-auth">
  <div class="auth-card">
    <div style="font-size: 3rem; margin-bottom: 1rem;">⚡</div>
    <h1 style="margin-bottom: 2rem; color: var(--admin-dark);">ProVolt Admin</h1>
    
    <form id="admin-login-form">
      <div class="form-group">
        <input type="text" id="username" class="form-control" placeholder="Admin Username (admin)" required>
      </div>
      <div class="form-group">
        <input type="password" id="password" class="form-control" placeholder="Password (admin123)" required>
      </div>
      <div id="login-error" style="color: var(--admin-danger); font-size: 0.85rem; display:none; margin-bottom: 1rem;"></div>
      <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
    </form>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
