<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages - ProVolt Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="wrapper">
    <nav class="sidebar">
      <div class="sidebar-header">⚡ ProVolt Admin</div>
      <ul class="sidebar-nav">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="bookings.html">Bookings</a></li>
        <li><a href="messages.html" class="active">Messages</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="appearance.html">Appearance</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ul>
    </nav>

    <div class="main-content">
      <div class="topbar">
        <h3>Customer Comms</h3>
        <div class="topbar-right">
          <span style="font-weight: 600;">Admin</span>
          <button id="logout-btn" class="btn btn-sm btn-danger">Logout</button>
        </div>
      </div>

      <div class="content-body">
        <div class="card">
          <div class="card-header">Inbound Transmissions</div>
          <div class="card-body">
            <div class="table-responsive">
              <table>
                <thead>
                  <tr>
                    <th>Msg ID</th>
                    <th>Sender Identity</th>
                    <th>Reply Node (Email)</th>
                    <th>Status</th>
                    <th>Controls</th>
                  </tr>
                </thead>
                <tbody id="messages-body">
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="viewModal">
    <div class="modal-content">
      <div class="modal-header">
        <h4 style="margin: 0;">Transmission Payload</h4>
        <button onclick="window.ModalUtils.close('viewModal')" class="btn btn-sm btn-danger">X</button>
      </div>
      <div class="modal-body" id="modal-detail-content">
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/messages.js"></script>
</body>
</html>
