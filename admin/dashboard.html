<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - ProVolt Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="wrapper">
    <!-- Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-header">⚡ ProVolt Admin</div>
      <ul class="sidebar-nav">
        <li><a href="dashboard.html" class="active">Dashboard</a></li>
        <li><a href="bookings.html">Bookings</a></li>
        <li><a href="messages.html">Messages</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="appearance.html">Appearance</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ul>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
      <div class="topbar">
        <h3>System Overview</h3>
        <div class="topbar-right">
          <span style="font-weight: 600;">Admin</span>
          <button id="logout-btn" class="btn btn-sm btn-danger">Logout</button>
        </div>
      </div>

      <div class="content-body">
        
        <div class="stats-grid">
          <div class="card stat-card">
            <div class="card-body">
              <div>
                <div class="stat-title" style="color: var(--admin-primary);">Total Bookings</div>
                <div class="stat-value" id="stat-total-bookings">0</div>
              </div>
            </div>
          </div>
          <div class="card stat-card warning">
            <div class="card-body">
              <div>
                <div class="stat-title" style="color: var(--admin-warning);">Pending action</div>
                <div class="stat-value" id="stat-pending">0</div>
              </div>
            </div>
          </div>
          <div class="card stat-card success">
            <div class="card-body">
              <div>
                <div class="stat-title" style="color: var(--admin-success);">Completed Jobs</div>
                <div class="stat-value" id="stat-completed">0</div>
              </div>
            </div>
          </div>
          <div class="card stat-card">
            <div class="card-body">
              <div>
                <div class="stat-title" style="color: var(--admin-primary);">Messages</div>
                <div class="stat-value" id="stat-messages">0</div>
              </div>
            </div>
          </div>
          <div class="card stat-card">
            <div class="card-body">
              <div>
                <div class="stat-title" style="color: var(--admin-primary);">Active Services</div>
                <div class="stat-value" id="stat-services">0</div>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">Recent Activity log</div>
          <div class="card-body">
            <div class="table-responsive">
              <table>
                <thead>
                  <tr>
                    <th>Ref ID</th>
                    <th>Customer</th>
                    <th>Service Matrix</th>
                    <th>Status</th>
                    <th>Timestamp</th>
                  </tr>
                </thead>
                <tbody id="recent-activity-body">
                </tbody>
              </table>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
