<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - ProVolt Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="wrapper">
    <nav class="sidebar">
      <div class="sidebar-header">⚡ ProVolt Admin</div>
      <ul class="sidebar-nav">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="bookings.html">Bookings</a></li>
        <li><a href="messages.html">Messages</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="appearance.html">Appearance</a></li>
        <li><a href="settings.html" class="active">Settings</a></li>
      </ul>
    </nav>

    <div class="main-content">
      <div class="topbar">
        <h3>System Configuration</h3>
        <div class="topbar-right">
          <span style="font-weight: 600;">Admin</span>
          <button id="logout-btn" class="btn btn-sm btn-danger">Logout</button>
        </div>
      </div>

      <div class="content-body" style="max-width: 800px;">
        <div class="card">
          <div class="card-header">Public Facing Constants</div>
          <div class="card-body">
            <form id="settings-form">
              <div class="form-group">
                <label>Company Display Phone</label>
                <input type="text" id="set-phone" class="form-control">
              </div>
              <div class="form-group">
                <label>Master Email Address</label>
                <input type="email" id="set-email" class="form-control">
              </div>
              <div class="form-group">
                <label>Physical HQ Address</label>
                <input type="text" id="set-address" class="form-control">
              </div>
              <div class="form-group">
                <label>Operating Hours Text</label>
                <input type="text" id="set-hours" class="form-control">
              </div>
              
              <button type="submit" class="btn btn-primary mt-3">Finalize Config</button>
            </form>
          </div>
        </div>

        <div class="card">
          <div class="card-header">Admin Credentials & Notification Config</div>
          <div class="card-body">
            <form id="auth-settings-form">
              <div class="form-group">
                <label>Admin Login Username</label>
                <input type="text" id="set-admin-user" class="form-control" required placeholder="admin">
              </div>
              <div class="form-group">
                <label>Admin Login Password</label>
                <input type="password" id="set-admin-pass" class="form-control" required placeholder="Leave blank to keep unchanged">
              </div>
              <div class="form-group">
                <label>Additional Admin Mails (Comma separated)</label>
                <input type="text" id="set-admin-mails" class="form-control" placeholder="admin2@domain.com, admin3@domain.com">
                <small style="color:#888;">System will CC notifications to these specific addresses.</small>
              </div>
              
              <button type="submit" class="btn btn-danger mt-3">Update Security Credentials</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
